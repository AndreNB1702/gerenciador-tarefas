<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #1e3a8a; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .btn-sair { background: #d93025; position: absolute; top: 15px; right: 15px; width: 80px; font-size: 0.8rem; }
        
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h2 style="margin-bottom: 20px;">Login</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha" onkeypress="handleEnter(event)">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="estoque-screen" class="card hidden" style="max-width: 800px;">
        <button class="btn-sair" onclick="logout()">Sair</button>
        <h1>Estoque</h1>
        
        <div id="admin-area" class="hidden" style="margin-top: 20px;">
            <input type="text" id="p-nome" placeholder="Nome do produto">
            <input type="number" id="p-qtd" placeholder="Qtd">
            <input type="number" id="p-preco" placeholder="Preço">
            <button onclick="adicionar()">Cadastrar Produto</button>
        </div>

        <table>
            <thead><tr><th>Produto</th><th>Qtd</th><th>Preço</th><th>Ação</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <script>
        const API = "http://localhost:8000";

        // Função para capturar o Enter
        function handleEnter(event) {
            if (event.key === "Enter") fazerLogin();
        }

        async function fazerLogin() {
            const u = document.getElementById("user").value;
            const p = document.getElementById("pass").value;
            try {
                const res = await fetch(`${API}/login?username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`, { method: "POST" });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem("role", data.role);
                    document.getElementById("login-screen").classList.add("hidden");
                    document.getElementById("estoque-screen").classList.remove("hidden");
                    if(data.role === "admin") document.getElementById("admin-area").classList.remove("hidden");
                    carregar();
                } else {
                    alert("Usuário ou senha incorretos!");
                }
            } catch (erro) {
                alert("Não foi possível conectar ao servidor (" + API + "). Verifique se o backend está rodando (docker compose up -d --build) e tente novamente em alguns segundos.");
                console.error(erro);
            }
        }

        async function carregar() {
            const res = await fetch(`${API}/produtos`);
            const prods = await res.json();
            const role = localStorage.getItem("role");
            const lista = document.getElementById("lista");
            lista.innerHTML = "";
            prods.forEach(p => {
                const acao = role === "admin" 
                    ? `<button style="background:#d93025" onclick="deletar(${p.id})">Excluir</button>` 
                    : `<button style="background:#16a34a" onclick="comprar(${p.id})">Comprar</button>`;
                lista.innerHTML += `<tr><td>${p.nome}</td><td>${p.quantidade}</td><td>R$ ${p.preco.toFixed(2)}</td><td>${acao}</td></tr>`;
            });
        }

        async function adicionar() {
            const body = { 
                nome: document.getElementById("p-nome").value,
                quantidade: parseInt(document.getElementById("p-qtd").value),
                preco: parseFloat(document.getElementById("p-preco").value)
            };
            await fetch(`${API}/produtos`, { 
                method: "POST", 
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body) 
            });
            carregar();
        }

        async function comprar(id) {
            const qtd = prompt("Quantidade?");
            if(!qtd) return;
            await fetch(`${API}/produtos/${id}/comprar?quantidade_comprada=${qtd}`, { method: "PUT" });
            carregar();
        }

        async function deletar(id) {
            await fetch(`${API}/produtos/${id}`, { method: "DELETE" });
            carregar();
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
